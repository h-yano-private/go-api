<!DOCTYPE html>
<html>
<head>
    <title>タスク管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        select, #keyword-search {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            background: white;
            color: #333;
            transition: border-color 0.3s;
        }

        select:focus, #keyword-search:focus {
            outline: none;
            border-color: #667eea;
        }

        #keyword-search {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        #task-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        #task-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #task-deadline {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            flex: 0.5;
            transition: border-color 0.3s;
        }
        
        #task-deadline:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        #task-list {
            list-style: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            background: #efefef;
            transform: translateX(5px);
        }
        
        .task-item.completed {
            opacity: 0.6;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }
        
        .task-deadline {
            font-size: 13px;
            color: #777;
        }

        .task-priority {
            display: inline-block;
            margin-top: 4px;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .task-priority.high {
            background: #ffe5e5;
            color: #c0392b;
        }

        .task-priority.medium {
            background: #fff4d6;
            color: #b7791f;
        }

        .task-priority.low {
            background: #e8f5e9;
            color: #2f855a;
        }
        
        .task-deadline.urgent {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .task-progress {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
        
        .subtask-list {
            list-style: none;
            padding-left: 0;
            margin-top: 10px;
        }
        
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #ffffff;
            border-radius: 8px;
            margin-top: 8px;
            box-shadow: inset 0 0 0 1px #e4e4e4;
        }
        
        .subtask-item.completed {
            opacity: 0.75;
        }
        
        .subtask-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .subtask-title {
            font-size: 14px;
            color: #444;
        }
        
        .subtask-item.completed .subtask-title {
            text-decoration: line-through;
            color: #999;
        }
        
        .task-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn-subtask-add, .btn-edit, .btn-delete {
            padding: 8px 15px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-subtask-add {
            background: #38a169;
            color: white;
        }
        
        .btn-subtask-add:hover {
            background: #2f855a;
        }
        
        .btn-edit {
            background: #667eea;
            color: white;
        }
        
        .btn-edit:hover {
            background: #5a67d8;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 タスクリスト</h1>
        
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="新しいタスクを入力">
                <input type="date" id="task-deadline" title="期限を選択">
            </div>
            <div class="filter-row">
                <input type="text" id="keyword-search" placeholder="キーワード検索" oninput="applyKeywordSearch(this.value)">
                <select id="status-filter" onchange="applyFilters('status', this.value)">
                    <option value="all">すべて</option>
                    <option value="completed">達成済み</option>
                    <option value="not-completed">未達成</option>
                </select>
                <select id="deadline-filter" onchange="applyFilters('deadline', this.value)">
                    <option value="all">期限すべて</option>
                    <option value="overdue">期限切れ</option>
                    <option value="due-soon">あと3日以内</option>
                    <option value="no-deadline">期限なし</option>
                </select>
                <select id="task-priority">
                    <option value="medium">優先度: 中</option>
                    <option value="high">優先度: 高</option>
                    <option value="low">優先度: 低</option>
                </select>
            </div>
            <button onclick="postTask()">追加</button>
        </div>
        
        <ul id="task-list"></ul>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
